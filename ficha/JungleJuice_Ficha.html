<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jungle Juice RPG - Criador de Ficha</title>
<style>
  :root {
    --bg: #070c09;
    --panel: #0d1712;
    --panel-2: #0a120d;
    --line: #1b2f22;
    --line-soft: #14231a;
    --green: #57c98a;
    --green-dim: #2f5a41;
    --text: #c6d6c0;
    --muted: #5a7563;
    --amber: #f0b429;
    --red: #ef5350;
    --blue: #4aa3f0;
    --purple: #a978e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 50% -100px, #10201700, #070c09), var(--bg);
    color: var(--text);
    font-family: ui-monospace, "Cascadia Code", "Courier New", monospace;
    line-height: 1.5;
    padding-bottom: 60px;
  }
  a { color: var(--green); }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(7,12,9,0.94);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
    padding: 12px 18px;
  }
  .topbar-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .logo { font-size: 24px; }
  .brand h1 { font-size: 15px; letter-spacing: 3px; color: var(--green); font-weight: 700; }
  .brand small { display: block; font-size: 9px; letter-spacing: 2px; color: var(--muted); }
  .stats { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; }
  .stat {
    display: flex; align-items: center; gap: 7px;
    background: var(--panel); border: 1px solid var(--line-soft);
    border-radius: 8px; padding: 6px 12px; font-size: 13px;
  }
  .stat b { font-size: 17px; }

  main { max-width: 960px; margin: 0 auto; padding: 22px 16px; display: grid; gap: 18px; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
  .card > h2 {
    font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--green); margin-bottom: 4px; display: flex; align-items: center; gap: 9px;
  }
  .card > .hint { color: var(--muted); font-size: 11px; margin-bottom: 16px; }

  label.f { display: block; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  input, textarea, select {
    width: 100%; background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px;
    padding: 10px 12px; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--green); }
  input::placeholder, textarea::placeholder { color: var(--green-dim); }
  textarea { resize: vertical; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { margin-bottom: 14px; }
  @media (max-width: 620px) { .grid2 { grid-template-columns: 1fr; } .stats { width: 100%; } }

  /* Attributes */
  .attr-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 620px) { .attr-list { grid-template-columns: 1fr; } }
  .attr {
    background: var(--panel-2); border: 1px solid var(--line-soft);
    border-radius: 10px; padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .attr .meta { display: flex; align-items: center; gap: 10px; }
  .attr .emoji { font-size: 20px; }
  .attr .abbr { color: var(--green); font-weight: 700; font-size: 13px; }
  .attr .desc { color: var(--muted); font-size: 10px; }
  .stepper { display: flex; align-items: center; gap: 8px; }
  .stepper button {
    width: 30px; height: 30px; border-radius: 7px; font-size: 18px; font-weight: 700;
    background: var(--line-soft); border: 1px solid var(--line); color: var(--green);
  }
  .stepper button:hover { border-color: var(--green); }
  .stepper .val { min-width: 30px; text-align: center; font-size: 22px; font-weight: 700; }

  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--line); border-radius: 999px; padding: 6px 14px; font-size: 12px;
    margin-bottom: 14px;
  }
  .pill b { font-size: 16px; }

  .btn {
    border-radius: 9px; padding: 11px 16px; font-size: 12px; font-weight: 700;
    letter-spacing: 1px; border: 1px solid var(--line); background: var(--line-soft); color: var(--text);
  }
  .btn:hover { border-color: var(--green); }
  .btn-primary { background: #17311f; border-color: var(--green); color: var(--green); }
  .btn-blue { background: #10243a; border-color: var(--blue); color: var(--blue); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-dash { width: 100%; background: transparent; border: 1px dashed var(--line); color: var(--muted); padding: 12px; border-radius: 10px; }
  .btn-dash:hover { border-color: var(--green); color: var(--green); }
  .btn-x { background: #2a0f0f; border: 1px solid #4a1c1c; color: var(--red); border-radius: 7px; padding: 6px 10px; font-size: 12px; }

  .sub {
    background: var(--panel-2); border: 1px solid var(--line-soft);
    border-radius: 10px; padding: 14px; margin-bottom: 12px;
  }
  .sub .top { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .badge { border-radius: 6px; padding: 2px 9px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .flex1 { flex: 1; min-width: 130px; }

  .legend { font-size: 10px; color: var(--muted); margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 12px; }
  .legend span b { font-weight: 700; }

  .out { width: 100%; background: #050807; border: 1px solid var(--line); border-radius: 10px; color: #9db89a; font-size: 12px; padding: 14px; white-space: pre; overflow: auto; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .toast { color: var(--green); font-size: 11px; margin-left: 6px; }
</style>
</head>
<body>
<div id="topbar"></div>
<main id="app"></main>

<script>
"use strict";

/* =========================================================
   Jungle Juice RPG - Criador de Ficha (standalone)
   Regras: atributos base 0, 21 pontos, max 7 por atributo.
   Exporta JSON (Foundry) e bloco de texto (Discord).
   ========================================================= */

const ATTRS = [
  { key: "for", abbr: "FOR", label: "Forca",        emoji: "\u{1F44A}", desc: "Corpo a corpo, forca fisica" },
  { key: "agi", abbr: "AGI", label: "Agilidade",    emoji: "\u{1F3C3}", desc: "Velocidade, esquiva (define AC)" },
  { key: "res", abbr: "RES", label: "Resistencia",  emoji: "\u{1F4AA}", desc: "HP, sobrevivencia, exaustao" },
  { key: "men", abbr: "MEN", label: "Mente",        emoji: "\u{1F9E0}", desc: "Foco, controle do Complex" },
  { key: "per", abbr: "PER", label: "Percepcao",    emoji: "\u{1F441}", desc: "Sentidos, notar detalhes" },
  { key: "pre", abbr: "PRE", label: "Precisao",     emoji: "\u{1F3AF}", desc: "Ataques a distancia, precisao" },
  { key: "int", abbr: "INT", label: "Inteligencia", emoji: "\u{1F4A1}", desc: "Raciocinio, social, enigmas" }
];

const ABTYPES = [
  { value: "passiva",  label: "Passiva",      cost: 1, ins: 0,  badge: "P",  color: "#57c98a" },
  { value: "ativa_l",  label: "Ativa leve",   cost: 2, ins: 5,  badge: "AL", color: "#f0b429" },
  { value: "ativa_f",  label: "Ativa forte",  cost: 3, ins: 10, badge: "AF", color: "#f0872b" },
  { value: "especial", label: "Especial",     cost: 4, ins: 15, badge: "E",  color: "#ef5350" }
];

const TIERS = [
  { v: "1", name: "Improvisado",    bonus: "+1d4" },
  { v: "2", name: "Refinado",       bonus: "+1d6" },
  { v: "3", name: "Especializado",  bonus: "+1d8" }
];

const FACTIONS = ["NEST", "Pet Shop", "Stray Dogs", "Hollow", "The Swarm", "Prometheus", "The Web", "Blackmoth"];

const TOTAL_POINTS = 21;
const MAX_ATTR = 7;
const BASE_CX = 5;
const MAX_WEAK = 2;
const MAX_ABIL = 6;
const MAX_ITEMS = 2;

const state = {
  name: "", insect: "", faction: "NEST", origin: "", motivation: "",
  attrs: { for: 0, agi: 0, res: 0, men: 0, per: 0, pre: 0, int: 0 },
  abilities: [],
  extraWeak: 0,
  items: [{ name: "", tier: "1", desc: "" }, { name: "", tier: "1", desc: "" }],
  insanity: 0
};

/* ---------- calculos ---------- */
const spent = () => ATTRS.reduce((s, a) => s + state.attrs[a.key], 0);
const remaining = () => TOTAL_POINTS - spent();
const hp = () => 10 + state.attrs.res * 2;
const ac = () => 8 + state.attrs.agi;
const cxTotal = () => BASE_CX + Math.min(state.extraWeak, MAX_WEAK);
const cxUsed = () => state.abilities.reduce((s, ab) => {
  const t = ABTYPES.find(x => x.value === ab.type);
  return s + (t ? t.cost : 0);
}, 0);
const cxLeft = () => cxTotal() - cxUsed();

function insInfo(v) {
  if (v < 25) return { label: "Estavel",    color: "#57c98a" };
  if (v < 50) return { label: "Tenso",      color: "#f0b429" };
  if (v < 75) return { label: "Abalado",    color: "#f0872b" };
  if (v < 100) return { label: "Perturbado", color: "#ef5350" };
  return { label: "COLAPSO", color: "#b71c1c" };
}

/* ---------- helpers ---------- */
function h(tag, attrs, kids) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    const v = attrs[k];
    if (v == null) continue;
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.slice(0, 2) === "on" && typeof v === "function") e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  if (kids != null) [].concat(kids).forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === "object" ? c : document.createTextNode(String(c)));
  });
  return e;
}

function field(labelText, control) {
  return h("div", { class: "field" }, [h("label", { class: "f" }, labelText), control]);
}

/* ---------- render ---------- */
function renderTopbar() {
  const bar = document.getElementById("topbar");
  bar.innerHTML = "";
  const ins = insInfo(state.insanity);
  const rem = remaining();
  bar.appendChild(
    h("div", { class: "topbar" }, [
      h("div", { class: "topbar-inner" }, [
        h("div", { class: "brand" }, [
          h("span", { class: "logo" }, "\u{1F99F}"),
          h("div", {}, [
            h("h1", {}, "JUNGLE JUICE"),
            h("small", {}, state.name ? state.name : "CRIADOR DE FICHA")
          ])
        ]),
        h("div", { class: "stats" }, [
          statBox("\u{2764}\u{FE0F}", "HP", hp(), "#ef5350"),
          statBox("\u{1F6E1}\u{FE0F}", "AC", ac(), "#4aa3f0"),
          statBox("\u{1F4CA}", "Pts", rem, rem === 0 ? "#57c98a" : "#f0b429"),
          statBox("\u{1F9E0}", ins.label, state.insanity, ins.color)
        ])
      ])
    ])
  );
}

function statBox(emoji, label, value, color) {
  return h("div", { class: "stat" }, [
    h("span", {}, emoji),
    h("span", { style: "color:var(--muted);font-size:11px" }, label),
    h("b", { style: "color:" + color }, String(value))
  ]);
}

function render() {
  renderTopbar();
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(sectionIdentity());
  app.appendChild(sectionAttrs());
  app.appendChild(sectionComplex());
  app.appendChild(sectionItems());
  app.appendChild(sectionExport());
}

function sectionIdentity() {
  const card = h("div", { class: "card" }, [
    h("h2", {}, ["\u{1F4CB}", "Identidade"]),
    h("p", { class: "hint" }, "Quem e o personagem por tras da infeccao.")
  ]);
  const nameInp = h("input", { placeholder: "Nome do personagem", value: state.name, oninput: e => { state.name = e.target.value; renderTopbar(); } });
  const insectInp = h("input", { placeholder: "Inseto do Complex (Libelula, Escorpiao...)", value: state.insect, oninput: e => { state.insect = e.target.value; } });

  const facSel = h("select", { onchange: e => { state.faction = e.target.value; } },
    FACTIONS.map(f => h("option", { value: f, selected: f === state.faction ? "selected" : null }, f)));

  const originTa = h("textarea", { rows: "3", placeholder: "Quem era antes? Como a infeccao aconteceu?", oninput: e => { state.origin = e.target.value; } });
  originTa.value = state.origin;
  const motivTa = h("textarea", { rows: "2", placeholder: "O que te move? O que ainda tenta preservar?", oninput: e => { state.motivation = e.target.value; } });
  motivTa.value = state.motivation;

  card.appendChild(h("div", { class: "grid2" }, [field("Nome", nameInp), field("Inseto do Complex", insectInp)]));
  card.appendChild(field("Faccao", facSel));
  card.appendChild(field("Origem / Background", originTa));
  card.appendChild(field("Motivacao", motivTa));
  return card;
}

function sectionAttrs() {
  const rem = remaining();
  const card = h("div", { class: "card" }, [
    h("h2", {}, ["\u{1F4CA}", "Atributos"]),
    h("p", { class: "hint" }, "Comecam em 0. Distribua " + TOTAL_POINTS + " pontos, no maximo " + MAX_ATTR + " por atributo.")
  ]);

  card.appendChild(h("div", { class: "pill", style: "border-color:" + (rem === 0 ? "var(--green)" : "var(--amber)") }, [
    h("span", { style: "color:var(--muted)" }, "Gastos:"),
    h("b", { style: "color:var(--green)" }, String(spent())),
    h("span", { style: "color:var(--muted)" }, "/ " + TOTAL_POINTS + "  \u{00B7}  restam:"),
    h("b", { style: "color:" + (rem === 0 ? "var(--green)" : "var(--amber)") }, String(rem))
  ]));

  const list = h("div", { class: "attr-list" });
  ATTRS.forEach(a => {
    const val = h("span", { class: "val" }, String(state.attrs[a.key]));
    list.appendChild(h("div", { class: "attr" }, [
      h("div", { class: "meta" }, [
        h("span", { class: "emoji" }, a.emoji),
        h("div", {}, [
          h("div", {}, [h("span", { class: "abbr" }, a.abbr), h("span", { style: "color:var(--muted);font-size:11px" }, "  " + a.label)]),
          h("div", { class: "desc" }, a.desc)
        ])
      ]),
      h("div", { class: "stepper" }, [
        h("button", { onclick: () => changeAttr(a.key, -1) }, "\u2212"),
        val,
        h("button", { onclick: () => changeAttr(a.key, 1) }, "+")
      ])
    ]));
  });
  card.appendChild(list);
  return card;
}

function sectionComplex() {
  const left = cxLeft();
  const card = h("div", { class: "card" }, [
    h("h2", {}, ["\u{1F41B}", "Insecta Complex"]),
    h("p", { class: "hint" }, "Habilidades ligadas ao seu inseto. Cada tipo custa pontos e pode gerar insanidade.")
  ]);

  card.appendChild(h("div", { style: "display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px" }, [
    h("div", { class: "pill", style: "margin:0;border-color:" + (left >= 0 ? "var(--green)" : "var(--red)") }, [
      h("span", { style: "color:var(--muted)" }, "Complex:"),
      h("b", { style: "color:" + (left >= 0 ? "var(--green)" : "var(--red)") }, String(left)),
      h("span", { style: "color:var(--muted)" }, "/ " + cxTotal())
    ]),
    h("div", { style: "display:flex;align-items:center;gap:8px" }, [
      h("span", { style: "color:var(--muted);font-size:11px" }, "Fraquezas extras (+1pt, max 2):"),
      h("button", { class: "btn", style: "padding:4px 10px", onclick: () => changeWeak(-1) }, "\u2212"),
      h("b", { style: "color:var(--amber);min-width:16px;text-align:center", id: "weakval" }, String(state.extraWeak)),
      h("button", { class: "btn", style: "padding:4px 10px", onclick: () => changeWeak(1) }, "+")
    ])
  ]));

  card.appendChild(h("div", { class: "legend" },
    ABTYPES.map(t => h("span", {}, [
      h("b", { style: "color:" + t.color }, t.badge + " "),
      t.label + " = " + t.cost + "pt" + (t.ins > 0 ? " / +" + t.ins + " ins" : "")
    ]))
  ));

  state.abilities.forEach((ab, i) => card.appendChild(abilityCard(ab, i)));

  if (state.abilities.length < MAX_ABIL) {
    card.appendChild(h("button", { class: "btn-dash", onclick: addAbility }, "+ Adicionar Habilidade"));
  }
  return card;
}

function abilityCard(ab, i) {
  const t = ABTYPES.find(x => x.value === ab.type) || ABTYPES[0];
  const box = h("div", { class: "sub", style: "border-left:3px solid " + t.color });

  const nameInp = h("input", { class: "flex1", placeholder: "Nome da habilidade", value: ab.name, oninput: e => { state.abilities[i].name = e.target.value; } });
  const typeSel = h("select", { style: "width:150px", onchange: e => { state.abilities[i].type = e.target.value; render(); } },
    ABTYPES.map(x => h("option", { value: x.value, selected: x.value === ab.type ? "selected" : null }, x.label + " (" + x.cost + "pt)")));

  box.appendChild(h("div", { class: "top" }, [
    h("span", { class: "badge", style: "background:" + t.color + "22;color:" + t.color }, t.badge),
    nameInp,
    typeSel,
    h("button", { class: "btn-x", onclick: () => removeAbility(i) }, "\u2715")
  ]));

  const descInp = h("input", { placeholder: "Descricao do efeito", value: ab.desc, oninput: e => { state.abilities[i].desc = e.target.value; }, style: "margin-bottom:8px" });
  const dmgInp = h("input", { placeholder: "Dado de dano (opcional, ex: 1d6)", value: ab.damage || "", oninput: e => { state.abilities[i].damage = e.target.value; }, style: "margin-bottom:8px" });
  const weakInp = h("input", { placeholder: "Fraqueza / limitacao obrigatoria", value: ab.weakness, oninput: e => { state.abilities[i].weakness = e.target.value; } });

  box.appendChild(descInp);
  box.appendChild(dmgInp);
  box.appendChild(h("div", { style: "display:flex;align-items:center;gap:8px" }, [
    h("span", { style: "color:var(--amber);font-size:11px;white-space:nowrap" }, "\u{26A0}\u{FE0F} Fraqueza:"),
    weakInp
  ]));
  return box;
}

function sectionItems() {
  const card = h("div", { class: "card" }, [
    h("h2", {}, ["\u{1F392}", "Itens & Adaptacoes"]),
    h("p", { class: "hint" }, "Maximo " + MAX_ITEMS + " itens. Cada um deve fazer sentido com o seu Complex.")
  ]);

  state.items.forEach((it, i) => {
    const nameInp = h("input", { class: "flex1", placeholder: "Nome do item", value: it.name, oninput: e => { state.items[i].name = e.target.value; } });
    const tierSel = h("select", { style: "width:210px", onchange: e => { state.items[i].tier = e.target.value; } },
      TIERS.map(t => h("option", { value: t.v, selected: t.v === it.tier ? "selected" : null }, "Tier " + t.v + " - " + t.name + " (" + t.bonus + ")")));
    const descInp = h("input", { placeholder: "Como se relaciona com o Complex?", value: it.desc, oninput: e => { state.items[i].desc = e.target.value; } });

    const box = h("div", { class: "sub" }, [
      h("div", { style: "color:var(--green);font-size:11px;letter-spacing:1px;margin-bottom:10px" }, "SLOT " + (i + 1)),
      h("div", { class: "top" }, [nameInp, tierSel]),
      descInp
    ]);
    card.appendChild(box);
  });
  return card;
}

function sectionExport() {
  const card = h("div", { class: "card" }, [
    h("h2", {}, ["\u{1F4E4}", "Exportar"]),
    h("p", { class: "hint" }, "Discord: bloco de texto formatado. Foundry: JSON para importar na aba Identidade (GM).")
  ]);

  const discordOut = h("pre", { class: "out", style: "min-height:200px;max-height:340px" }, genDiscord());
  const discordToast = h("span", { class: "toast" }, "");
  const discordBtn = h("button", { class: "btn btn-primary", onclick: () => copy(discordOut.textContent, discordToast) }, "\u{1F4CB} Copiar Discord");

  const jsonOut = h("pre", { class: "out", style: "min-height:140px;max-height:260px" }, genJson());
  const jsonToast = h("span", { class: "toast" }, "");
  const jsonBtn = h("button", { class: "btn btn-blue", onclick: () => copy(jsonOut.textContent, jsonToast) }, "\u{1F4E5} Copiar JSON (Foundry)");
  const dlBtn = h("button", { class: "btn", onclick: downloadJson }, "\u{1F4BE} Baixar .json");

  card.appendChild(h("div", { style: "color:var(--green);font-size:11px;letter-spacing:1px;margin-bottom:6px" }, "FICHA PARA O DISCORD"));
  card.appendChild(discordOut);
  card.appendChild(h("div", { class: "row" }, [discordBtn, discordToast]));

  card.appendChild(h("div", { style: "color:var(--blue);font-size:11px;letter-spacing:1px;margin:18px 0 6px" }, "JSON PARA O FOUNDRY"));
  card.appendChild(jsonOut);
  card.appendChild(h("div", { class: "row" }, [jsonBtn, dlBtn, jsonToast]));
  return card;
}

/* ---------- acoes ---------- */
function changeAttr(key, d) {
  const nv = state.attrs[key] + d;
  if (nv < 0 || nv > MAX_ATTR) return;
  if (d > 0 && remaining() <= 0) return;
  state.attrs[key] = nv;
  render();
}
function changeWeak(d) {
  state.extraWeak = Math.max(0, Math.min(MAX_WEAK, state.extraWeak + d));
  render();
}
function addAbility() {
  if (state.abilities.length >= MAX_ABIL) return;
  state.abilities.push({ name: "", type: "passiva", desc: "", weakness: "", damage: "" });
  render();
}
function removeAbility(i) {
  state.abilities.splice(i, 1);
  render();
}

function copy(text, toast) {
  const done = () => { toast.textContent = "\u{2713} copiado"; setTimeout(() => { toast.textContent = ""; }, 1800); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(done);
  } else {
    done();
  }
}

function downloadJson() {
  const blob = new Blob([genJson()], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = h("a", { href: url, download: (state.name || "ficha").replace(/\s+/g, "_") + ".json" });
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

/* ---------- exportacao ---------- */
function genJson() {
  return JSON.stringify({
    version: 1,
    name: state.name,
    insect: state.insect,
    faction: state.faction,
    origin: state.origin,
    motivation: state.motivation,
    attrs: state.attrs,
    abilities: state.abilities.map(a => ({
      name: a.name, type: a.type, desc: a.desc, weakness: a.weakness, damage: a.damage || ""
    })),
    extraWeak: state.extraWeak,
    items: state.items,
    insanity: state.insanity
  }, null, 2);
}

function genDiscord() {
  const line = "\u{2501}".repeat(30);
  const attrLine = ATTRS.map(a => a.emoji + " **" + a.abbr + "** `" + state.attrs[a.key] + "`").join("  ");

  const abil = state.abilities.length === 0
    ? "> *Nenhuma habilidade.*"
    : state.abilities.map(ab => {
        const t = ABTYPES.find(x => x.value === ab.type);
        const insTag = t && t.ins > 0 ? "+" + t.ins + " ins" : "sem custo";
        const dmg = ab.damage ? "  \u{00B7}  dano `" + ab.damage + "`" : "";
        return [
          "> \u{1F539} **" + (ab.name || "Sem nome") + "**  \u{00B7}  *" + (t ? t.label : "?") + "*  \u{00B7}  `" + insTag + "`" + dmg,
          "> " + (ab.desc || "*Sem descricao.*"),
          "> \u{26A0}\u{FE0F} " + (ab.weakness || "*Sem fraqueza definida.*")
        ].join("\n");
      }).join("\n>\n");

  const filled = state.items.filter(it => it.name.trim());
  const items = filled.length === 0
    ? "> *Nenhum item.*"
    : filled.map(it => {
        const t = TIERS.find(x => x.v === it.tier);
        return "> \u{1F538} **" + it.name + "**  \u{00B7}  Tier " + it.tier + " (" + (t ? t.bonus : "") + ")\n> " + (it.desc || "*Sem descricao.*");
      }).join("\n>\n");

  const ins = insInfo(state.insanity);
  const filledBar = Math.floor(state.insanity / 10);
  const bar = "\u{2588}".repeat(filledBar) + "\u{2591}".repeat(10 - filledBar);

  return [
    "\u{1F99F} **JUNGLE JUICE RPG** \u{2014} Ficha",
    line,
    "**" + (state.name || "Sem Nome") + "**",
    "\u{1F41B} Inseto: " + (state.insect || "*nao definido*") + "   \u{00B7}   \u{1F3E0} Faccao: **" + state.faction + "**",
    "",
    "__ATRIBUTOS__",
    attrLine,
    "\u{2764}\u{FE0F} HP `" + hp() + "`   \u{1F6E1}\u{FE0F} AC `" + ac() + "`   \u{1F9E0} Insanidade `" + state.insanity + "/100` (" + ins.label + ")",
    "`" + bar + "`",
    "",
    "__INSECTA COMPLEX__ (" + (state.insect || "?") + ")",
    abil,
    "",
    "__ITENS__",
    items,
    "",
    "__ORIGEM__",
    "> " + (state.origin || "*Nao definida.*"),
    "\u{1F3AF} Motivacao: " + (state.motivation || "*Nao definida.*")
  ].join("\n");
}

render();
</script>
